name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Raycast extension
        run: |
          cp src/lib/api-shim-raycast.ts src/lib/api-shim.ts
          npx ray build -o ./dist -e dist
      - name: Package extension
        run: |
          cd dist && zip -r ../takoba-raycast.zip takoba.js package.json assets/
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes --cleanup-tag 2>/dev/null || true
          cat > /tmp/release-notes.md <<EOM
          ## Takoba ${{ github.ref_name }}

          ### Installation

          **Raycast**: Download \`takoba-raycast.zip\`, extract to the Raycast extensions folder, and run \`npx ray develop\` in the extracted directory.

          **Vicinae**: Available on AUR as \`vicinae-takoba\`.
          EOM
          gh release create "${{ github.ref_name }}" \
            --title "Takoba ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            takoba-raycast.zip
